   SUPABASE SHARED DATABASE CONNECTION
   These two values connect every user to the same data.
   The publishable key is safe to live in the browser.
   ============================================================ */
const SB_URL = "https://otwzhrgfzcbruygompwb.supabase.co/rest/v1";
const SB_KEY = "sb_publishable_q_ZC1C5N9zRa1yMA5OItXg_OZmrhYdi";
const SB_HEADERS = {
  "apikey": SB_KEY,
  "Authorization": "Bearer " + SB_KEY,
  "Content-Type": "application/json",
};

async function loadData() {
  try {
    const res = await fetch(`${SB_URL}/boats_data?id=in.(boats,log)&select=id,data`, { headers: SB_HEADERS });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const rows = await res.json();
    const boatsRow = rows.find(r => r.id === "boats");
    const logRow   = rows.find(r => r.id === "log");
    return {
      boats: Array.isArray(boatsRow?.data) ? boatsRow.data : [],
      log:   Array.isArray(logRow?.data)   ? logRow.data   : [],
      ok: true,
    };
  } catch(e) { console.error("Load error:", e); return { boats:[], log:[], ok:false }; }
}

async function saveRow(id, value) {
  const res = await fetch(`${SB_URL}/boats_data?id=eq.${id}`, {
    method: "PATCH",
    headers: { ...SB_HEADERS, "Prefer": "return=minimal" },
    body: JSON.stringify({ data: value }),
  });
  if(!res.ok) throw new Error("HTTP " + res.status);
}

async function saveData(boats, log) {
  try {
    await Promise.all([ saveRow("boats", boats), saveRow("log", log) ]);
    return true;
  } catch(e) { console.error("Save error:", e); return false; }
}

  return (
    <div style={{ display:"flex", alignItems:"center", margin:"10px 0" }}>
      {WORKFLOW.map((s,i)=>{
        const done=i<idx, active=i===idx;
        const dot=active?T.red:done?"#22a24a":T.border;
        return (
          <div key={s} style={{ display:"flex", alignItems:"center", flex:1 }}>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1 }}>
              <div style={{ width:18, height:18, borderRadius:"50%", background:done?"#DFF2E5":active?T.redLight:T.surface, border:`2px solid ${dot}`, display:"flex", alignItems:"center", justifyContent:"center" }}>

  );
}

        {boat.notes&&<div style={{ background:T.offWhite, borderRadius:7, padding:"9px 12px", border:`1px solid ${T.border}`, marginBottom:14 }}><div style={{ fontSize:10, color:T.midGray, marginBottom:3 }}>Notes</div><div style={{ fontSize:13, color:T.charcoal }}>{boat.notes}</div></div>}
        <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:12 }}>
          {!confirmDel ? (
            <div style={{ display:"flex", justifyContent:"flex-end" }}>
              <button onClick={()=>setConfirmDel(true)} style={{ fontSize:12, padding:"7px 14px", borderRadius:7, background:T.white, color:T.redDark, border:`1px solid ${T.redMid}`, cursor:"pointer", fontWeight:500 }}>🗑 Remove unit</button>
            </div>
          ) : (
            <div style={{ background:"#FDE8E8", border:`1px solid ${T.redMid}`, borderRadius:8, padding:"12px 14px" }}>
              <div style={{ fontSize:13, color:T.redDark, marginBottom:10 }}>Permanently remove <strong>{boat.unit}</strong> ({boat.dealNo}) for everyone? This can't be undone.</div>
              <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
                <button onClick={()=>setConfirmDel(false)} style={{ fontSize:12, padding:"7px 14px", borderRadius:7, background:T.surface, color:T.charcoal, border:`1px solid ${T.border}`, cursor:"pointer" }}>Cancel</button>
                <button onClick={()=>{ setConfirmDel(false); onDelete(boat); }} style={{ fontSize:12, padding:"7px 14px", borderRadius:7, background:T.red, color:T.white, border:`1px solid ${T.redDark}`, cursor:"pointer", fontWeight:500 }}>Yes, remove it</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TechWorkload({ boats }) {
  const load={};
  TECHS.forEach(t=>{load[t]={hrs:0,jobs:0};});
  boats.forEach(b=>b.jobs.filter(j=>!j.done).forEach(j=>{if(load[j.tech]){load[j.tech].hrs+=j.hrs;load[j.tech].jobs++;}}));
  const max=Math.max(...Object.values(load).map(l=>l.hrs),8);
  return (
    <div style={{ background:T.white, border:`1px solid ${T.border}`, borderRadius:10, overflow:"hidden", marginBottom:12 }}>
      <div style={{ background:T.black, padding:"12px 16px" }}><div style={{ fontSize:14, fontWeight:500, color:T.white }}>Technician workload</div></div>
      <div style={{ padding:16 }}>
        {TECHS.map(t=>(
          <div key={t} style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}><span style={{ fontWeight:500, color:T.black }}>{t}</span><span style={{ color:T.midGray }}>{load[t].hrs}h · {load[t].jobs} jobs</span></div>
            <div style={{ height:8, borderRadius:4, background:T.surface, overflow:"hidden" }}><div style={{ height:"100%", width:`${(load[t].hrs/max)*100}%`, background:load[t].hrs>10?T.red:load[t].hrs>6?"#D4860A":"#2E7D32", borderRadius:4 }} /></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function WeekCalendar({ boats }) {
  const days=Array.from({length:7},(_,i)=>addDays(today,i));
  const getD=d=>boats.filter(b=>b.deliveryDate&&fmt(b.deliveryDate)===fmt(d)&&b.status!=="DELIVERED");
  return (
    <div style={{ background:T.white, border:`1px solid ${T.border}`, borderRadius:10, overflow:"hidden", marginBottom:12 }}>
      <div style={{ background:T.black, padding:"12px 16px" }}><div style={{ fontSize:14, fontWeight:500, color:T.white }}>7-day delivery schedule</div></div>
      <div style={{ padding:14 }}>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:6 }}>
          {days.map((d,i)=>{
            const deliveries=getD(d), isToday=i===0;
            return <div key={i} style={{ background:isToday?T.redLight:T.offWhite, borderRadius:8, padding:"8px 6px", minHeight:58, border:`1px solid ${isToday?T.redMid:T.border}` }}>
              <div style={{ fontSize:10, fontWeight:500, color:isToday?T.red:T.midGray, marginBottom:4 }}>{d.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase()}<br /><span style={{ fontSize:13, color:isToday?T.red:T.black }}>{d.getDate()}</span></div>
              {deliveries.map(b=><div key={b.id} style={{ fontSize:10, background:STATUS[b.status].bg, color:STATUS[b.status].color, borderRadius:4, padding:"2px 4px", marginBottom:2, lineHeight:1.3 }}>{b.id}</div>)}
            </div>;
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [currentUser,setCurrentUser]=useState(null);
  const [boats,setBoats]=useState([]);
  const [activityLog,setActivityLog]=useState([]);
  const [selected,setSelected]=useState(null);
  const [view,setView]=useState("dashboard");
  const [filterStatus,setFilterStatus]=useState("ALL");
  const [showWizard,setShowWizard]=useState(false);
  const [newAlerts,setNewAlerts]=useState([]);
  const [saveStatus,setSaveStatus]=useState("idle"); // idle | saving | saved | error
  const [loading,setLoading]=useState(true);
  const [connErr,setConnErr]=useState(false);
  const saveTimer=useRef(null);
  const skipNextSave=useRef(true);   // don't save right after loading
  const savingNow=useRef(false);     // pause polling while a save is in flight

  // Initial load
  useEffect(()=>{
    if(typeof emailjs !== "undefined"){ try{ emailjs.init(EJS_KEY); }catch(e){} }
    loadData().then(({boats:b,log:l,ok})=>{
      setBoats(b); setActivityLog(l); setConnErr(!ok); setLoading(false);
    });
  },[]);

  // Poll the shared database every 12s so each user sees others' changes
  useEffect(()=>{
    if(!currentUser) return;
    const iv=setInterval(async()=>{
      if(savingNow.current) return; // don't clobber a save in progress
      const { boats:b, log:l, ok } = await loadData();
      if(ok){
        skipNextSave.current=true; // incoming remote data shouldn't trigger a re-save
        setBoats(b); setActivityLog(l); setConnErr(false);
      }
    },12000);
    return ()=>clearInterval(iv);
  },[currentUser]);

  // Auto-save to shared database whenever data changes (debounced)
  useEffect(()=>{
    if(loading) return;
    if(skipNextSave.current){ skipNextSave.current=false; return; }
    setSaveStatus("saving");
    savingNow.current=true;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const ok=await saveData(boats,activityLog);
      savingNow.current=false;
      setSaveStatus(ok?"saved":"error");
      setConnErr(!ok);
      setTimeout(()=>setSaveStatus("idle"),2500);
    },700);
    return ()=>clearTimeout(saveTimer.current);
  },[boats,activityLog]);

  const addLog=useCallback(entry=>{
    setActivityLog(l=>[entry,...l].slice(0,100));
    setNewAlerts(a=>[entry,...a]);
  },[]);

  const handleUpdateStatus=useCallback((id,status)=>{
    setBoats(bs=>bs.map(b=>{
      if(b.id!==id) return b;
      sendEmailAlert({
        user: currentUser?.name||"Unknown", role: currentUser?.role||"",
        event:"Status Change", unit:b.unit,
        details:`${STATUS[b.status].label} → ${STATUS[status].label} | Deal: ${b.dealNo} | Customer: ${b.customer||"—"}`,
      });
      return {...b,status};
    }));
  },[currentUser]);

  const handleToggleJob=useCallback((boatId,jobIdx)=>{
    setBoats(bs=>bs.map(b=>{
      if(b.id!==boatId) return b;
      return {...b, jobs:b.jobs.map((j,i)=>i===jobIdx?{...j,done:!j.done}:j)};
    }));
  },[]);

  const handleTogglePart=useCallback((boatId,partIdx)=>{
    setBoats(bs=>bs.map(b=>{
      if(b.id!==boatId) return b;
      return {...b, parts:b.parts.map((p,i)=>i===partIdx?{...p,arrived:!p.arrived}:p)};
    }));
  },[]);

  const handleAdd=useCallback(boat=>{
    setBoats(bs=>[boat,...bs]);
    setSelected(boat.id);
    addLog({uid:boat.salesperson,user:boat.salesperson||"System",msg:`New unit added: ${boat.unit} (${boat.dealNo} · ${boat.stockNo}) — Customer: ${boat.customer||"TBD"}`,type:"add",time:ts()});
    sendEmailAlert({
      user: currentUser?.name||"Unknown", role: currentUser?.role||"",
      event:"New Unit Added", unit:boat.unit,
      details:`Deal: ${boat.dealNo} | RO: ${boat.roNo} | Stock: ${boat.stockNo} | Customer: ${boat.customer||"TBD"} | Salesperson: ${boat.salesperson||"TBD"}`,
    });
  },[addLog,currentUser]);

  const handleDelete=useCallback(boat=>{
    setBoats(bs=>bs.filter(b=>b.id!==boat.id));
    setSelected(null);
    addLog({uid:currentUser?.id,user:currentUser?.name||"System",msg:`Unit removed: ${boat.unit} (${boat.dealNo} · ${boat.stockNo})`,type:"edit",time:ts()});
    sendEmailAlert({
      user: currentUser?.name||"Unknown", role: currentUser?.role||"",
      event:"Unit Removed", unit:boat.unit,
      details:`Deal: ${boat.dealNo} | RO: ${boat.roNo} | Stock: ${boat.stockNo} | Customer: ${boat.customer||"—"} | Status at removal: ${STATUS[boat.status].label}`,
    });
  },[addLog,currentUser]);

  if(loading) return (
    <div style={{ minHeight:"100vh", background:T.black, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
      <LogoBadge height={56} />
      <div style={{ fontSize:13, color:T.lightGray }}>Connecting to shared database…</div>
    </div>
  );

  if(!currentUser) return <LoginScreen onLogin={u=>{setCurrentUser(u);addLog({uid:u.id,user:u.name,msg:`${u.name} (${u.role}) logged in`,type:"edit",time:ts()});}} />;

  const selectedBoat=boats.find(b=>b.id===selected);

  const opAlerts=[];
  boats.forEach(b=>{
    if(b.deliveryDate&&new Date(b.deliveryDate)<today&&b.status!=="DELIVERED")
      opAlerts.push({type:"danger",msg:`${b.unit} — delivery overdue (${fmt(b.deliveryDate)})`});
    const late=b.parts.filter(p=>!p.arrived&&new Date(p.eta)<=addDays(today,1));
    if(late.length&&b.status!=="DELIVERED")
      opAlerts.push({type:"warn",msg:`${b.unit} — parts due/overdue: ${late.map(p=>p.name).join(", ")}`});
    if(b.status==="READY"&&b.sold)
      opAlerts.push({type:"info",msg:`${b.unit} — ready for delivery. Contact ${b.customer}.`});
  });

  const counts=Object.fromEntries(Object.keys(STATUS).map(s=>[s,boats.filter(b=>b.status===s).length]));
  const filtered=filterStatus==="ALL"?boats:boats.filter(b=>b.status===filterStatus);
  const sorted=[...filtered].sort((a,b)=>{
    if(a.sold!==b.sold) return a.sold?-1:1;
    if(a.deliveryDate&&b.deliveryDate) return new Date(a.deliveryDate)-new Date(b.deliveryDate);
    return a.deliveryDate?-1:1;
  });
  const COLS=[["Pending","SOLD"],["In Service","IN_SERVICE"],["Parts","WAITING_PARTS"],["Ready","READY"],["Delivered","DELIVERED"]];
  const u=currentUser;

  const saveChip = saveStatus==="saving" ? {t:"⏳ Saving…", c:"#D4860A", bg:"#FDF3DC", b:"#F0D080"}
    : saveStatus==="saved" ? {t:"✅ Saved", c:"#22a24a", bg:"#DFF2E5", b:"#85D4A0"}
    : saveStatus==="error" ? {t:"⚠ Save failed", c:"#8B1A1E", bg:"#FDE8E8", b:"#E8B4B6"} : null;

  return (
    <div style={{ fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif", background:T.offWhite, minHeight:"100vh", padding:16 }}>
      {showWizard&&<Wizard onClose={()=>setShowWizard(false)} onAdd={handleAdd} currentUser={u} />}

      {connErr&&<AlertBar type="danger">Can't reach the shared database right now — changes may not be saving. Check your internet connection.</AlertBar>}

      {newAlerts.length>0&&<div style={{ marginBottom:12 }}>{newAlerts.map((a,i)=>(
        <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"9px 14px", borderRadius:8, background:a.type==="add"?T.redLight:a.type==="status"?"#DFF2E5":"#E8F0FD", border:`1px solid ${a.type==="add"?T.redMid:a.type==="status"?"#85D4A0":"#93B8F5"}`, marginBottom:6 }}>
          <span style={{ fontSize:15 }}>{a.type==="add"?"🔔":a.type==="status"?"🔄":"ℹ"}</span>
          <span style={{ flex:1, fontSize:13, color:a.type==="add"?T.redDark:a.type==="status"?"#1A5C2E":"#1A3F8B" }}><strong>{a.user}</strong> — {a.msg}</span>
          <button onClick={()=>setNewAlerts(x=>x.filter((_,j)=>j!==i))} style={{ background:"none", border:"none", cursor:"pointer", color:T.midGray }}>✕</button>
        </div>
      ))}</div>}

      <div style={{ background:T.black, borderRadius:10, padding:"14px 20px", marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <LogoBadge height={48} />
          {saveChip&&<span style={{ fontSize:11, color:saveChip.c, background:saveChip.bg, padding:"3px 9px", borderRadius:12, border:`1px solid ${saveChip.b}` }}>{saveChip.t}</span>}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          <div style={{ display:"flex", gap:5 }}>
            {["dashboard","calendar","workload","activity"].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{ fontSize:11, padding:"5px 11px", borderRadius:6, border:`1px solid ${view===v?T.red:T.darkGray}`, background:view===v?T.red:"transparent", color:view===v?T.white:T.lightGray, cursor:"pointer", fontWeight:view===v?500:400 }}>
                {v.charAt(0).toUpperCase()+v.slice(1)}
                {v==="activity"&&activityLog.length>0&&<span style={{ marginLeft:5, background:T.red, color:T.white, fontSize:9, padding:"1px 5px", borderRadius:8 }}>{activityLog.length}</span>}
              </button>
            ))}
          </div>
          <button onClick={()=>setShowWizard(true)} style={{ fontSize:12, padding:"5px 13px", borderRadius:6, border:`1px solid ${T.red}`, background:T.red, color:T.white, cursor:"pointer", fontWeight:500 }}>+ Add unit</button>
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 10px", borderRadius:6, background:T.charcoal, border:`1px solid ${T.darkGray}` }}>
            <div style={{ width:24, height:24, borderRadius:"50%", background:u.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:600, color:T.white }}>{u.name[0]}</div>
            <div style={{ lineHeight:1.2 }}><div style={{ fontSize:12, color:T.white, fontWeight:500 }}>{u.name}</div><div style={{ fontSize:10, color:T.lightGray }}>{u.role}</div></div>
            <button onClick={()=>setCurrentUser(null)} style={{ background:"none", border:"none", cursor:"pointer", color:T.midGray, marginLeft:4, fontSize:16 }} title="Log out">⇥</button>
          </div>
        </div>
      </div>

      {opAlerts.length>0&&<div style={{ marginBottom:14 }}>{opAlerts.map((a,i)=><AlertBar key={i} type={a.type}>{a.msg}</AlertBar>)}</div>}

      {view==="dashboard"&&<>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:8, marginBottom:14 }}>
          {COLS.map(([l,s])=>(
            <div key={s} onClick={()=>setFilterStatus(filterStatus===s?"ALL":s)} style={{ background:filterStatus===s?T.black:T.white, borderRadius:8, padding:"12px 10px", textAlign:"center", cursor:"pointer", border:`1.5px solid ${filterStatus===s?T.red:T.border}` }}>
              <div style={{ fontSize:26, fontWeight:500, color:filterStatus===s?T.red:T.black }}>{counts[s]}</div>
              <div style={{ fontSize:10, color:filterStatus===s?T.lightGray:T.midGray, marginTop:2 }}>{l}</div>
              <div style={{ height:2, width:20, background:filterStatus===s?T.red:T.border, borderRadius:2, margin:"6px auto 0" }} />
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:5, marginBottom:12, flexWrap:"wrap" }}>
          <button onClick={()=>setFilterStatus("ALL")} style={{ fontSize:11, padding:"3px 11px", borderRadius:20, cursor:"pointer", background:filterStatus==="ALL"?T.black:T.surface, color:filterStatus==="ALL"?T.white:T.midGray, border:`1px solid ${filterStatus==="ALL"?T.black:T.border}`, fontWeight:filterStatus==="ALL"?600:400 }}>All units</button>
          {Object.keys(STATUS).map(s=>(
            <button key={s} onClick={()=>setFilterStatus(filterStatus===s?"ALL":s)} style={{ fontSize:11, padding:"3px 11px", borderRadius:20, cursor:"pointer", background:filterStatus===s?STATUS[s].bg:T.surface, color:filterStatus===s?STATUS[s].color:T.midGray, border:`1px solid ${filterStatus===s?STATUS[s].border:T.border}`, fontWeight:filterStatus===s?600:400 }}>{STATUS[s].label}</button>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:selected?"1fr 1fr":"1fr", gap:12 }}>
          <div>
            {sorted.length===0&&<div style={{ textAlign:"center", padding:"48px 24px", color:T.midGray, fontSize:14 }}>
              <div style={{ fontSize:48, marginBottom:12 }}>⛵</div>
              No units yet — click <strong>+ Add unit</strong> to get started
            </div>}
            {sorted.map(b=><BoatCard key={b.id} boat={b} onSelect={id=>setSelected(id===selected?null:id)} selected={selected===b.id} />)}
          </div>
          {selected&&<div>
            <DetailPanel boat={selectedBoat} onClose={()=>setSelected(null)} onUpdateStatus={handleUpdateStatus} onToggleJob={handleToggleJob} onTogglePart={handleTogglePart} onDelete={handleDelete} currentUser={u} onLog={addLog} />
          </div>}
        </div>
      </>}

      {view==="calendar"&&<WeekCalendar boats={boats} />}
      {view==="workload"&&<TechWorkload boats={boats} />}
      {view==="activity"&&(
        <div style={{ background:T.white, border:`1px solid ${T.border}`, borderRadius:10, overflow:"hidden" }}>
          <div style={{ background:T.black, padding:"12px 16px", display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:3, height:18, background:T.red, borderRadius:2 }} />
            <div style={{ fontSize:14, fontWeight:500, color:T.white }}>Activity log</div>
            {activityLog.length>0&&<button onClick={()=>setActivityLog([])} style={{ marginLeft:"auto", fontSize:11, padding:"3px 10px", borderRadius:6, background:"transparent", border:`1px solid ${T.darkGray}`, color:T.lightGray, cursor:"pointer" }}>Clear log</button>}
          </div>
          <div style={{ padding:16 }}><ActivityFeed log={activityLog} /></div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
